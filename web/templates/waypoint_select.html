<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Waypoint</title>
</head>
<body>
    <h1>Select a Waypoint</h1>
    <video width="640" controls>
        <source src="{{ url_for('video', filename=video_file) }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <form method="post" action="{{ url_for('select') }}">
        <h2>Waypoints</h2>
        <ul>
        {% for wpt in waypoints %}
            <li>
                <label>
                    <input type="radio" name="waypoint" value="{{ wpt['name'] }}">
                    {{ wpt['name'] }} ({{ wpt['latitude'] }}, {{ wpt['longitude'] }})
                </label>
            </li>
        {% endfor %}
        </ul>
        <button type="submit">Confirm Selection</button>
    </form>
</body>
</html>
